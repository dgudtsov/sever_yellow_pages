<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Северный — Навигация</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <header class="hero">
      <div class="hero-top">
        <div class="badge">Северный · Жёлтые страницы</div>
        <div class="mini-tag">Telegram Mini App</div>
      </div>
      <h1>Навигация по разделам</h1>
      <p>Выберите категорию, чтобы открыть список сервисов внутри мини‑приложения.</p>

      <div class="search">
        <input id="search" type="search" placeholder="Поиск по сервисам" autocomplete="off" />
        <span class="search-hint">Найдено: <strong id="result-count">0</strong></span>
      </div>

      <nav id="toc" class="toc" aria-label="Навигация"></nav>
    </header>

    <main id="content" class="content"></main>

    <footer class="footer">
      <span>Обновляйте список в файле TelegramMiniAppNavigation.md</span>
    </footer>
  </body>
</html>
